<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - POS System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  body { background: linear-gradient(135deg,#111827,#4f46e5); min-height:100vh; display:flex; align-items:center; }
  .login-card { border-radius: 18px; max-width: 380px; margin: auto; }
</style>
</head>
<body>
<div class="card login-card shadow p-4 w-100">
  <div class="text-center mb-3">
    <i class="bi bi-shop" style="font-size:2.5rem; color:#4f46e5;"></i>
    <h4 class="mt-2 mb-0">POS Vuthy</h4>
    <div class="text-muted small">ប្រព័ន្ធគ្រប់គ្រងការលក់ / Sales Management System</div>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-box-arrow-in-right"></i> Login
    </button>
  </form>
  <div class="text-center text-muted small mt-3">Default: admin / admin123</div>
</div>
</body>
</html>
