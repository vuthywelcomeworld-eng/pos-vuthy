services:
  - type: web
    name: pos-vuthy
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: LOW_STOCK_THRESHOLD
        value: "5"
      - key: FLASK_DEBUG
        value: "false"
